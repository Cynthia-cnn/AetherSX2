name: Build AetherPurpleSX2 (CMake Repack)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ cmake make ninja-build git zip openjdk-17-jdk
      
      # HAPUS STEP "Setup Android SDK & NDK" YANG LAMA
      # GANTI DENGAN INI:
      - name: Setup Android Environment Manually
        run: |
          # Gunakan SDK yang sudah ada di runner
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          
          # Install NDK R23c secara manual via sdkmanager yang sudah ada
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "ndk;23.1.7779620" --sdk_root=/usr/local/lib/android/sdk
          
          # Set variabel NDK
          echo "NDK_PATH=/usr/local/lib/android/sdk/ndk/23.1.7779620" >> $GITHUB_ENV
          
          # Tambahkan build-tools ke PATH (untuk zipalign & apksigner)
          echo "/usr/local/lib/android/sdk/build-tools/34.0.0" >> $GITHUB_PATH
      
      - name: Download Shell APK
        run: |
          mkdir -p build-android/apk
          curl -fL "https://github.com/AetherSX2-backup/AetherSX2-builds/raw/master/alpha-2928-3060/13322-v1.4-3060.apk" -o build-android/apk/purplesx2.apk || \
          curl -fL "https://archive.org/download/AetherSX2-Collection/alpha-2928-3060/13322-v1.4-3060.apk" -o build-android/apk/purplesx2.apk
      
      - name: Configure CMake
        run: |
          mkdir -p build-android && cd build-android
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21
      
      - name: Build libemucore.so
        run: |
          cd build-android
          make -j$(nproc)
      
      - name: Repack APK
        run: |
          cd build-android/apk
          mkdir -p lib/arm64-v8a
          # CATATAN: Sesuaikan path libemucore.so jika berbeda
          cp ../pcsx2/libemucore.so lib/arm64-v8a/ 2>/dev/null || \
          cp ../libemucore.so lib/arm64-v8a/ || \
          find .. -name "libemucore.so" -exec cp {} lib/arm64-v8a/ \;
          
          zip -0 purplesx2.apk lib/arm64-v8a/libemucore.so
      
      - name: Align & Sign APK
        run: |
          cd build-android/apk
          zipalign -p 4 purplesx2.apk purplesx2-aligned.apk
          
          keytool -genkey -v -keystore debug.keystore -alias debugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Dev, O=Local, L=City, S=State, C=ID"
          
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out AetherPurpleSX2-signed.apk purplesx2-aligned.apk
      
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherPurpleSX2-Final
          path: build-android/apk/AetherPurpleSX2-signed.apk
          retention-days: 7
