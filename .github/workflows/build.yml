name: Build AetherPurpleSX2 Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK R23c
        run: |
          sdkmanager --install "ndk;23.1.7779620"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV
      - name: Download Shell APK
        run: |
          
          mkdir -p app/
          
          
          curl -fL "https://github.com/AetherSX2-backup/AetherSX2-builds/raw/master/alpha-2928-3060/13322-v1.4-3060.apk" -o app/shell.apk || \
          
          
          curl -fL "https://archive.org/download/AetherSX2-Collection/alpha-2928-3060/13322-v1.4-3060.apk" -o app/shell.apk || \
          
          
          exit 1
          
          
          ls -lh app/shell.apk

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherPurpleSX2-Build
          path: app/build/outputs/apk/release/
          compression-level: 0
          retention-days: 5
